<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Community Art Map</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@500;600;700;800&display=swap"
    />
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
      }

      .leaflet-popup.art-popup .leaflet-popup-content-wrapper {
        border-radius: 14px;
        padding: 0;
        background: #fffefb;
        box-shadow: 0 14px 28px rgba(18, 13, 9, 0.35);
        border: 1px solid rgba(59, 39, 18, 0.2);
      }

      .leaflet-popup.art-popup .leaflet-popup-content {
        margin: 0;
      }

      .leaflet-popup.art-popup .leaflet-popup-tip {
        background: #fffefb;
        box-shadow: 0 10px 18px rgba(18, 13, 9, 0.22);
      }

      .leaflet-popup.art-popup .leaflet-popup-close-button {
        color: #55351a;
        right: 8px;
        top: 6px;
      }

      .popup-card {
        width: min(68vw, 360px);
      }

      .popup-header {
        padding: 12px 34px 8px 12px;
        border-bottom: 1px solid rgba(70, 48, 26, 0.12);
      }

      .popup-title {
        margin: 0;
        color: #3f2512;
        font: 800 22px/1.08 "Nunito", "Segoe UI", sans-serif;
        letter-spacing: 0.01em;
      }

      .popup-notes {
        margin: 0;
        display: grid;
        gap: 10px;
        padding: 10px 12px 12px;
      }

      .popup-gallery {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .popup-gallery.single {
        grid-template-columns: 1fr;
      }

      .popup-photo-link {
        display: block;
        border-radius: 8px;
        overflow: hidden;
        line-height: 0;
        background: #e6d8c3;
      }

      .popup-photo-link img {
        display: block;
        width: 100%;
        height: 108px;
        object-fit: cover;
      }

      .popup-gallery.single .popup-photo-link img {
        height: 220px;
      }

      .popup-notes-text {
        color: #2f2418;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
        font: 600 16px/1.35 "Nunito", "Segoe UI", sans-serif;
      }

      .popup-notes-text p {
        margin: 0;
      }

      .popup-notes-text a {
        color: #0b63ce;
      }

      .map-title-control {
        max-width: min(70vw, 520px);
        padding: 14px 16px 12px;
        border-radius: 14px;
        background: rgba(255, 252, 245, 0.9);
        box-shadow: 0 10px 28px rgba(25, 20, 15, 0.3);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(80, 56, 25, 0.2);
      }

      .map-title-control h1 {
        margin: 0;
        color: #402515;
        font-size: clamp(28px, 4.2vw, 46px);
        line-height: 0.95;
        letter-spacing: 0.02em;
        font-family: "Great Vibes", "Times New Roman", serif;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      .map-title-control p {
        margin: 6px 0 0;
        color: #3e2f20;
        font: 700 15px/1.25 "Nunito", "Segoe UI", sans-serif;
      }

      .map-contribute {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(80, 56, 25, 0.18);
        color: #3e2f20;
        font: 600 14px/1.35 "Nunito", "Segoe UI", sans-serif;
      }

      .map-contribute a {
        color: #5f2f0f;
        font-weight: 700;
        text-decoration: underline;
      }

      .category-filter-control {
        min-width: 210px;
        max-width: min(80vw, 260px);
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.24);
        border: 1px solid rgba(0, 0, 0, 0.1);
      }

      .category-filter-title {
        margin: 0;
        color: #2a2a2a;
        font: 800 13px/1.2 "Nunito", "Segoe UI", sans-serif;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .category-filter-panel {
        margin-top: 8px;
      }

      .category-filter-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
        color: #2f2f2f;
        font: 700 13px/1.25 "Nunito", "Segoe UI", sans-serif;
      }

      .category-filter-item input {
        margin: 0;
      }

      .category-filter-icon {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: inline-grid;
        place-items: center;
        color: #fff;
        font-size: 12px;
        background: var(--cat-color, #555);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
      }

      .category-filter-label {
        display: inline-flex;
        align-items: baseline;
        gap: 6px;
      }

      .category-filter-count {
        color: #666;
        font-size: 12px;
      }

      .art-marker {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 14px;
        background: var(--marker-color, #555);
        border: 2px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
      }

      .legal-control {
        max-width: min(72vw, 320px);
        padding: 7px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(0, 0, 0, 0.1);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
        color: #2f2f2f;
        font: 700 12px/1.2 "Nunito", "Segoe UI", sans-serif;
      }

      .legal-control button {
        border: 0;
        background: transparent;
        color: #2f2f2f;
        font: inherit;
        cursor: pointer;
        padding: 0;
      }

      .legal-control.is-collapsed .legal-details {
        display: none;
      }

      .legal-details {
        margin-top: 6px;
        color: #4b4b4b;
        font-weight: 600;
      }

      @media (max-width: 800px) {
        .leaflet-top.leaflet-left .map-title-control {
          margin-left: 0;
          margin-top: 10px;
        }

        .map-title-control {
          max-width: 56vw;
          padding: 8px 10px;
        }

        .map-title-control h1 {
          font-size: clamp(20px, 7vw, 34px);
          line-height: 0.95;
        }

        .map-title-control > p,
        .map-contribute {
          display: none;
        }

        .leaflet-top.leaflet-left .category-filter-control {
          margin-left: calc(56vw + 8px);
          margin-top: 10px;
        }

        .category-filter-control {
          min-width: 132px;
          max-width: 150px;
          padding: 8px;
        }

        .category-filter-title {
          font-size: 12px;
        }

        .category-filter-item {
          gap: 6px;
          margin: 4px 0;
          font-size: 12px;
        }

        .category-filter-count {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script>
      const MAP_META = {
        title: "Urban Art of Altadena and surrounding areas",
        description: "All the local art, official and unofficial."
      };

      const CATEGORY_CONFIG = {
        paint: { label: "Paint", color: "#0288d1", icon: "🎨", visible: true },
        statues: { label: "Statues", color: "#a52714", icon: "🗿", visible: true },
        mixed: { label: "Mixed Media", color: "#f9a825", icon: "🧩", visible: true },
        mosaics: { label: "Mosaics", color: "#ff5252", icon: "◼", visible: true },
        interactive: { label: "Interactive", color: "#232323", icon: "✨", visible: true },
        other: { label: "Other", color: "#666666", icon: "?", visible: false }
      };

      // Basemap (Stamen Watercolor via Stadia Maps)
      const STADIA_KEY = "2e4ff880-1782-4c64-a908-c2a37db897fe";
      const watercolorUrl =
        "https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg" +
        (STADIA_KEY ? "?api_key=" + encodeURIComponent(STADIA_KEY) : "");

      const map = L.map("map", { zoomControl: false, attributionControl: false }).setView([34.19, -118.13], 13);

      const osmFallback = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 20
      }).addTo(map);

      const watercolorLayer = L.tileLayer(watercolorUrl, {
        // Watercolor has finite native coverage; scale native tiles at higher zooms.
        maxNativeZoom: 16,
        maxZoom: 20,
        opacity: 0.92,
        crossOrigin: true,
        // Keep fallback base visible when watercolor tiles fail.
        errorTileUrl:
          "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=",
        attribution: ""
      }).addTo(map);

      watercolorLayer.on("tileerror", () => {
        // Avoid noisy console floods in production; fallback layer is underneath.
      });

      const labelsLayer = L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png",
        {
          subdomains: "abcd",
          maxZoom: 20,
          attribution: "",
          pane: "overlayPane"
        }
      ).addTo(map);

      L.control
        .layers(
          null,
          {
            "Street labels": labelsLayer
          },
          { collapsed: true, position: "bottomright" }
        )
        .addTo(map);

      createTitleControl().addTo(map);
      createLegalControl().addTo(map);

      fetch("./public/data/art.geojson")
        .then((r) => r.json())
        .then((gj) => {
          const features = gj.features || [];
          const categoryLayers = new Map();
          const categoryCounts = new Map();
          const boundsCollector = L.featureGroup();

          for (const key of Object.keys(CATEGORY_CONFIG)) {
            categoryLayers.set(key, L.layerGroup());
            categoryCounts.set(key, 0);
            if (CATEGORY_CONFIG[key].visible) {
              categoryLayers.get(key).addTo(map);
            }
          }

          for (const feature of features) {
            const categoryKey = detectCategory(feature);
            categoryCounts.set(categoryKey, (categoryCounts.get(categoryKey) || 0) + 1);

            const featureLayer = L.geoJSON(feature, {
              pointToLayer: (f, latlng) => makePointMarker(f, latlng, categoryKey),
              style: () => ({
                color: CATEGORY_CONFIG[categoryKey].color,
                weight: 2,
                fillColor: CATEGORY_CONFIG[categoryKey].color,
                fillOpacity: 0.25
              }),
              onEachFeature: (f, l) => {
                const p = f.properties || {};
                const title = asPlainText(p.title || p.name);
                const notesBody = buildPopupNotesBody(p.notes || p.description);

                const html =
                  `<article class="popup-card">` +
                  (title ? `<header class="popup-header"><h3 class="popup-title">${escapeHtml(title)}</h3></header>` : "") +
                  (notesBody ? `<section class="popup-notes">${notesBody}</section>` : "") +
                  `</article>`;

                if (title || notesBody) {
                  l.bindPopup(html, { maxWidth: 420, className: "art-popup" });
                }
              }
            });

            featureLayer.addTo(categoryLayers.get(categoryKey));
            boundsCollector.addLayer(featureLayer);
          }

          createCategoryFilterControl(categoryLayers, categoryCounts).addTo(map);

          const bounds = boundsCollector.getBounds();
          if (bounds.isValid()) map.fitBounds(bounds.pad(0.15));
        })
        .catch((err) => console.error("Failed to load GeoJSON:", err));

      function createTitleControl() {
        const control = L.control({ position: "topleft" });
        control.onAdd = () => {
          const el = L.DomUtil.create("section", "map-title-control");
          el.innerHTML = `
            <h1>${escapeHtml(MAP_META.title)}</h1>
            <p>${escapeHtml(MAP_META.description)}</p>
            <p class="map-contribute">
              To add or update art, email
              <a href="mailto:altadenajoysquad@gmail.com?subject=Add%20or%20Update%20Community%20Art%20Map&body=Hi!%0A%0AI'd%20like%20to%20add%20or%20update%20an%20entry.%0A%0AArtwork%20name:%0ALocation:%0APhoto(s):%0AArtist%20details%20(optional):%0AAdditional%20notes:%0A">altadenajoysquad@gmail.com</a>
              with a photo, location, and any artist details.
            </p>
          `;
          L.DomEvent.disableClickPropagation(el);
          return el;
        };
        return control;
      }

      function createLegalControl() {
        const control = L.control({ position: "bottomleft" });
        control.onAdd = () => {
          const el = L.DomUtil.create("section", "legal-control is-collapsed");
          el.innerHTML = `
            <button type="button" class="legal-toggle">Map credits</button>
            <div class="legal-details">
              Map created by
              <a href="https://sites.google.com/view/joysquadcentral/home" target="_blank" rel="noopener noreferrer">Altadena Joy Squad</a>.<br />
              © OpenStreetMap contributors • Stamen watercolor via Stadia Maps • Labels by CARTO
            </div>
          `;

          const toggleBtn = el.querySelector(".legal-toggle");
          toggleBtn.addEventListener("click", () => {
            el.classList.toggle("is-collapsed");
          });

          L.DomEvent.disableClickPropagation(el);
          return el;
        };
        return control;
      }

      function createCategoryFilterControl(categoryLayers, categoryCounts) {
        const isMobile = window.matchMedia("(max-width: 800px)").matches;
        const control = L.control({ position: isMobile ? "topleft" : "topright" });

        control.onAdd = () => {
          const el = L.DomUtil.create("section", "category-filter-control");
          el.innerHTML = `
            <h2 class="category-filter-title">Categories</h2>
            <div class="category-filter-panel"></div>
          `;

          const panel = el.querySelector(".category-filter-panel");

          for (const [key, cfg] of Object.entries(CATEGORY_CONFIG)) {
            const count = categoryCounts.get(key) || 0;
            if (!count) continue;

            const row = document.createElement("label");
            row.className = "category-filter-item";
            row.innerHTML = `
              <input type="checkbox" ${map.hasLayer(categoryLayers.get(key)) ? "checked" : ""} />
              <span class="category-filter-icon" style="--cat-color:${cfg.color}">${cfg.icon}</span>
              <span class="category-filter-label">${cfg.label} <span class="category-filter-count">(${count})</span></span>
            `;

            const input = row.querySelector("input");
            input.addEventListener("change", () => {
              const layer = categoryLayers.get(key);
              if (!layer) return;
              if (input.checked) layer.addTo(map);
              else map.removeLayer(layer);
            });

            panel.appendChild(row);
          }

          L.DomEvent.disableClickPropagation(el);
          L.DomEvent.disableScrollPropagation(el);
          return el;
        };

        return control;
      }

      function makePointMarker(feature, latlng, categoryKey) {
        const cfg = CATEGORY_CONFIG[categoryKey] || CATEGORY_CONFIG.other;
        const icon = L.divIcon({
          className: "",
          html: `<span class="art-marker" style="--marker-color:${cfg.color}">${cfg.icon}</span>`,
          iconSize: [26, 26],
          iconAnchor: [13, 13],
          popupAnchor: [0, -10]
        });
        return L.marker(latlng, { icon });
      }

      function detectCategory(feature) {
        const p = feature.properties || {};
        const title = asPlainText(p.title || p.name).toLowerCase();
        const notes = asPlainText(p.notes || p.description).toLowerCase();
        const blob = `${title} ${notes}`;
        const iconColor = normalizeHexColor(p["icon-color"]).toLowerCase();
        const styleUrl = String(p.styleUrl || "").toUpperCase();

        if (blob.includes("interactive")) return "interactive";
        if (iconColor === "#0288d1" || styleUrl.includes("0288D1")) return "paint";
        if (iconColor === "#a52714" || styleUrl.includes("A52714")) return "statues";
        if (iconColor === "#f9a825" || styleUrl.includes("F9A825")) return "mixed";
        if (iconColor === "#ff5252" || styleUrl.includes("FF5252")) return "mosaics";

        if (["Polygon", "MultiPolygon"].includes(feature.geometry?.type || "")) {
          return "interactive";
        }

        return "other";
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function asPlainText(value) {
        if (value == null) return "";
        if (typeof value === "string") return value.trim();

        // My Maps KML often encodes description as { "@type": "html", "value": "<img ...>" }
        if (typeof value === "object") {
          const raw = typeof value.value === "string" ? value.value : JSON.stringify(value);
          return stripHtml(raw).trim();
        }

        return String(value).trim();
      }

      function stripHtml(input) {
        const div = document.createElement("div");
        div.innerHTML = input;
        return div.textContent || div.innerText || "";
      }

      function asRichHtml(value) {
        if (value == null) return "";

        if (typeof value === "object" && typeof value.value === "string") {
          return sanitizeRichHtml(value.value);
        }

        if (typeof value === "string" && /<[^>]+>/.test(value)) {
          return sanitizeRichHtml(value);
        }

        return "";
      }

      function sanitizeRichHtml(rawHtml) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(`<div>${rawHtml}</div>`, "text/html");
        const root = doc.body.firstElementChild;
        if (!root) return "";

        const allowedTags = new Set(["BR", "P", "STRONG", "EM", "B", "I", "A", "IMG", "UL", "OL", "LI"]);
        return Array.from(root.childNodes)
          .map((n) => sanitizeNodeToHtml(n, allowedTags))
          .join("");
      }

      function sanitizeNodeToHtml(node, allowedTags) {
        if (node.nodeType === Node.TEXT_NODE) return escapeHtml(node.textContent || "");
        if (node.nodeType !== Node.ELEMENT_NODE) return "";

        const tag = node.tagName.toUpperCase();
        const children = Array.from(node.childNodes)
          .map((n) => sanitizeNodeToHtml(n, allowedTags))
          .join("");

        if (!allowedTags.has(tag)) return children;
        if (tag === "BR") return "<br>";

        if (tag === "IMG") {
          const src = sanitizeUrl(node.getAttribute("src"));
          if (!src) return "";
          const safeSrc = escapeHtml(src);
          return `<img src="${safeSrc}" loading="lazy" decoding="async" />`;
        }

        if (tag === "A") {
          const href = sanitizeUrl(node.getAttribute("href"));
          if (!href) return children;
          return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${children || escapeHtml(href)}</a>`;
        }

        const lowerTag = tag.toLowerCase();
        return `<${lowerTag}>${children}</${lowerTag}>`;
      }

      function sanitizeUrl(url) {
        if (typeof url !== "string") return "";
        const trimmed = url.trim();
        if (!trimmed) return "";
        if (/^https:\/\//i.test(trimmed)) return trimmed;
        if (/^(?:\.\/|\/)/.test(trimmed) && !trimmed.startsWith("//")) return trimmed;
        return "";
      }

      function buildPopupNotesBody(value) {
        const rich = asRichHtml(value);
        if (!rich) {
          const textOnly = normalizePlainText(asPlainText(value));
          const linkedText = linkifyPlainUrls(escapeHtml(textOnly));
          return linkedText ? `<p class="popup-notes-text">${linkedText}</p>` : "";
        }

        const parser = new DOMParser();
        const doc = parser.parseFromString(`<div>${rich}</div>`, "text/html");
        const root = doc.body.firstElementChild;
        if (!root) return "";

        const imageSrcs = Array.from(root.querySelectorAll("img"))
          .map((img) => sanitizeUrl(img.getAttribute("src")))
          .filter(Boolean);
        const uniqueImageSrcs = Array.from(new Set(imageSrcs));

        for (const img of root.querySelectorAll("img")) img.remove();

        const textHtml = normalizeTextHtml(linkifyPlainUrls(root.innerHTML));
        const galleryHtml = uniqueImageSrcs.length
          ? `<div class="popup-gallery ${uniqueImageSrcs.length === 1 ? "single" : ""}">${uniqueImageSrcs
              .map((src) => {
                const safe = escapeHtml(src);
                return `<a class="popup-photo-link" href="${safe}" target="_blank" rel="noopener noreferrer"><img src="${safe}" loading="lazy" decoding="async" /></a>`;
              })
              .join("")}</div>`
          : "";

        const textBlockHtml = textHtml ? `<div class="popup-notes-text">${textHtml}</div>` : "";
        return `${galleryHtml}${textBlockHtml}`;
      }

      function linkifyPlainUrls(html) {
        if (!html) return "";
        const urlPattern = /(^|[\s(>])((https:\/\/[^\s<)]+))/gi;
        return html.replace(
          urlPattern,
          (match, prefix, url) =>
            `${prefix}<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>`
        );
      }

      function normalizePlainText(text) {
        return String(text || "")
          .replace(/\r\n/g, "\n")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function normalizeTextHtml(html) {
        if (!html) return "";

        return String(html)
          .replace(/^\s+|\s+$/g, "")
          .replace(/^(?:\s|<br\s*\/?>|&nbsp;)+/gi, "")
          .replace(/(?:\s|<br\s*\/?>|&nbsp;)+$/gi, "")
          .replace(/(?:<br\s*\/?>\s*){3,}/gi, "<br><br>");
      }

      function normalizeHexColor(value) {
        if (typeof value !== "string") return "";
        const v = value.trim();
        if (/^#[0-9a-fA-F]{6}$/.test(v)) return v;
        if (/^[0-9a-fA-F]{6}$/.test(v)) return "#" + v;
        return "";
      }
    </script>
  </body>
</html>
