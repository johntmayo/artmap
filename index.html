<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Community Art Map</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
      }

      .popup-title {
        font-weight: 700;
        margin: 0 0 6px;
      }

      .popup-notes {
        margin: 0;
        white-space: pre-wrap;
      }

      .popup-notes img {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 8px 0;
        border-radius: 6px;
      }

      .popup-notes a {
        color: #0b63ce;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script>
      // Basemap (Stamen Watercolor via Stadia Maps)
      const STADIA_KEY = "2e4ff880-1782-4c64-a908-c2a37db897fe";
      const watercolorUrl =
        "https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg" +
        (STADIA_KEY ? "?api_key=" + encodeURIComponent(STADIA_KEY) : "");

      const map = L.map("map", { zoomControl: true }).setView([34.19, -118.13], 13);

      L.tileLayer(watercolorUrl, {
        maxZoom: 16,
        attribution:
          "Map tiles by Stamen Design, hosted by Stadia Maps. Data © OpenStreetMap contributors."
      }).addTo(map);

      // Transparent label layer so street names are readable over watercolor.
      const labelsLayer = L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png",
        {
          subdomains: "abcd",
          maxZoom: 20,
          attribution:
            "© OpenStreetMap contributors © CARTO",
          pane: "overlayPane"
        }
      ).addTo(map);

      L.control
        .layers(
          null,
          {
            "Street labels": labelsLayer
          },
          { collapsed: true }
        )
        .addTo(map);

      fetch("./public/data/art.geojson")
        .then((r) => r.json())
        .then((gj) => {
          const layer = L.geoJSON(gj, {
            pointToLayer: (feature, latlng) => {
              const p = feature.properties || {};
              const fillColor = markerColorFor(p);
              return L.circleMarker(latlng, {
                radius: 7,
                color: "#ffffff",
                weight: 1.5,
                fillColor,
                fillOpacity: 0.95
              });
            },
            onEachFeature: (feature, l) => {
              const p = feature.properties || {};
              const title = asPlainText(p.title || p.name);
              const notesHtml = asRichHtml(p.notes || p.description);
              const notesText = asPlainText(p.notes || p.description);

              const html =
                (title ? `<div class="popup-title">${escapeHtml(title)}</div>` : "") +
                (notesHtml
                  ? `<div class="popup-notes">${notesHtml}</div>`
                  : notesText
                    ? `<p class="popup-notes">${escapeHtml(notesText)}</p>`
                    : "");

              if (html) l.bindPopup(html, { maxWidth: 320 });
            }
          }).addTo(map);

          const bounds = layer.getBounds();
          if (bounds.isValid()) map.fitBounds(bounds.pad(0.15));
        })
        .catch((err) => console.error("Failed to load GeoJSON:", err));

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function asPlainText(value) {
        if (value == null) return "";
        if (typeof value === "string") return value.trim();

        // My Maps KML often encodes description as { "@type": "html", "value": "<img ...>" }
        if (typeof value === "object") {
          const raw = typeof value.value === "string" ? value.value : JSON.stringify(value);
          return stripHtml(raw).trim();
        }

        return String(value).trim();
      }

      function stripHtml(input) {
        const div = document.createElement("div");
        div.innerHTML = input;
        return div.textContent || div.innerText || "";
      }

      function asRichHtml(value) {
        if (value == null) return "";

        if (typeof value === "object" && typeof value.value === "string") {
          return sanitizeRichHtml(value.value);
        }

        if (typeof value === "string" && /<[^>]+>/.test(value)) {
          return sanitizeRichHtml(value);
        }

        return "";
      }

      function sanitizeRichHtml(rawHtml) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(`<div>${rawHtml}</div>`, "text/html");
        const root = doc.body.firstElementChild;
        if (!root) return "";

        const allowedTags = new Set(["BR", "P", "STRONG", "EM", "B", "I", "A", "IMG", "UL", "OL", "LI"]);
        return Array.from(root.childNodes)
          .map((n) => sanitizeNodeToHtml(n, allowedTags))
          .join("");
      }

      function sanitizeNodeToHtml(node, allowedTags) {
        if (node.nodeType === Node.TEXT_NODE) return escapeHtml(node.textContent || "");
        if (node.nodeType !== Node.ELEMENT_NODE) return "";

        const tag = node.tagName.toUpperCase();
        const children = Array.from(node.childNodes)
          .map((n) => sanitizeNodeToHtml(n, allowedTags))
          .join("");

        if (!allowedTags.has(tag)) return children;
        if (tag === "BR") return "<br>";

        if (tag === "IMG") {
          const src = sanitizeUrl(node.getAttribute("src"));
          if (!src) return "";
          const safeSrc = escapeHtml(src);
          return `<img src="${safeSrc}" loading="lazy" decoding="async" /><p><a href="${safeSrc}" target="_blank" rel="noopener noreferrer">Open photo</a></p>`;
        }

        if (tag === "A") {
          const href = sanitizeUrl(node.getAttribute("href"));
          if (!href) return children;
          return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer">${children || escapeHtml(href)}</a>`;
        }

        const lowerTag = tag.toLowerCase();
        return `<${lowerTag}>${children}</${lowerTag}>`;
      }

      function sanitizeUrl(url) {
        if (typeof url !== "string") return "";
        const trimmed = url.trim();
        if (!trimmed) return "";
        if (/^https:\/\//i.test(trimmed)) return trimmed;
        if (/^(?:\.\/|\/)/.test(trimmed) && !trimmed.startsWith("//")) return trimmed;
        return "";
      }

      function markerColorFor(props) {
        const iconColor = normalizeHexColor(props["icon-color"]);
        if (iconColor) return iconColor;

        const styleUrl = String(props.styleUrl || "").toUpperCase();
        if (styleUrl.includes("FF5252")) return "#ff5252";
        if (styleUrl.includes("F9A825")) return "#f9a825";
        if (styleUrl.includes("A52714")) return "#a52714";
        if (styleUrl.includes("0288D1")) return "#0288d1";

        return "#444444";
      }

      function normalizeHexColor(value) {
        if (typeof value !== "string") return "";
        const v = value.trim();
        if (/^#[0-9a-fA-F]{6}$/.test(v)) return v;
        if (/^[0-9a-fA-F]{6}$/.test(v)) return "#" + v;
        return "";
      }
    </script>
  </body>
</html>
